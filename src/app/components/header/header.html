<header class="navbar" [class.scrolled]="isScrolled()">
  <div class="navbar-container">
    <!-- Logo & Brand Title -->
    <div class="nav-logo" (click)="scrollToSection('home')">
      <img src="assets/images/logo.png" alt="Bespoke Spaces Logo" class="logo-img">
      <div class="logo-text">
        <span class="logo-bold">BESPOKE</span>
        <span class="logo-light">SPACES</span>
      </div>
    </div>

    <!-- Desktop Navigation Links -->
    <nav class="nav-links">
      <a class="nav-link" (click)="scrollToSection('home')">Home</a>
      <a class="nav-link" (click)="scrollToSection('about')">About</a>
      <a class="nav-link" (click)="scrollToSection('services')">Services</a>
      <a class="nav-link" (click)="scrollToSection('portfolio')">Portfolio</a>
      <a class="nav-link highlight-link" (click)="scrollToSection('contact')">Enquire</a>
    </nav>

    <!-- Mobile Hamburger Menu Button -->
    <button 
      class="mobile-menu-toggle" 
      [class.active]="isMobileMenuOpen()" 
      (click)="toggleMobileMenu()" 
      aria-label="Toggle menu"
    >
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </div>
</header>

<!-- Mobile Navigation Drawer Overlay -->
<div class="mobile-nav-overlay" [class.open]="isMobileMenuOpen()" (click)="closeMobileMenu()">
  <nav class="mobile-nav-menu" (click)="$event.stopPropagation()">
    <div class="mobile-menu-logo" (click)="scrollToSection('home')">
      <img src="assets/images/logo.png" alt="Bespoke Spaces Logo" class="mobile-logo-img">
      <div class="mobile-logo-text">
        <span class="logo-bold">BESPOKE</span>
        <span class="logo-light">SPACES</span>
      </div>
    </div>
    <a class="mobile-nav-link" (click)="scrollToSection('home')">Home</a>
    <a class="mobile-nav-link" (click)="scrollToSection('about')">About Us</a>
    <a class="mobile-nav-link" (click)="scrollToSection('services')">Services</a>
    <a class="mobile-nav-link" (click)="scrollToSection('portfolio')">Our Portfolio</a>
    <a class="mobile-nav-link mobile-highlight-link" (click)="scrollToSection('contact')">Book Consultation</a>
    
    <div class="mobile-socials">
      <a href="https://www.instagram.com/bespokespaces_id/" target="_blank" class="social-icon-btn">
        Instagram
      </a>
    </div>
  </nav>
</div>
